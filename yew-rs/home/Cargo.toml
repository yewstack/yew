[package]
name = "yew-site-home"
version = "0.1.0"
edition = "2021"
rust-version = "1.84"

[features]
default = ["csr"]
csr = ["yew/csr", "yew-site-lib/csr"]
ssr = ["yew/ssr", "yew-site-lib/ssr"]

[dependencies]
yew = "0.23"
yew-site-lib = { path = "../lib", default-features = false }
stylist = { version = "0.15", features = ["yew_integration"] }
js_sys = { version = "0.3", package = "js-sys" }
web_sys = { version = "0.3", package = "web-sys", features = ["Window", "Location"] }

[[bin]]
name = "yew-site-home"
path = "src/main.rs"

[[bin]]
name = "search"
path = "src/bin/search.rs"

[[bin]]
name = "not-found"
path = "src/bin/not_found.rs"

[[bin]]
name = "home-ja"
path = "src/bin/home_ja.rs"

[[bin]]
name = "home-zh-hans"
path = "src/bin/home_zh_hans.rs"


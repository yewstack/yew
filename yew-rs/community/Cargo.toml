[package]
name = "yew-site-community"
version = "0.1.0"
edition = "2021"
rust-version = "1.84"

[features]
default = ["csr"]
csr = ["yew/csr", "yew-site-lib/csr"]
ssr = ["yew/ssr", "yew-site-lib/ssr"]

[dependencies]
yew = "0.23"
yew-site-lib = { path = "../lib", default-features = false }

[[bin]]
name = "awesome"
path = "src/bin/awesome.rs"

[[bin]]
name = "external-libs"
path = "src/bin/external_libs.rs"

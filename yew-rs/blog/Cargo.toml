[package]
name = "yew-site-blog"
version = "0.1.0"
edition = "2021"
rust-version = "1.84"

[features]
default = ["csr"]
csr = ["yew/csr", "yew-site-lib/csr"]
ssr = ["yew/ssr", "yew-site-lib/ssr"]

[dependencies]
implicit-clone = { workspace = true }
stylist = { version = "0.15", features = ["yew_integration"] }
yew = "0.23"
yew-site-lib = { path = "../lib", default-features = false }

[[bin]]
name = "blog-index"
path = "src/bin/blog_index.rs"

[[bin]]
name = "hello-yew"
path = "src/bin/hello_yew.rs"

[[bin]]
name = "release-0-20"
path = "src/bin/release_0_20.rs"

[[bin]]
name = "release-0-21"
path = "src/bin/release_0_21.rs"

[[bin]]
name = "release-0-22"
path = "src/bin/release_0_22.rs"

[[bin]]
name = "release-0-22-1"
path = "src/bin/release_0_22_1.rs"

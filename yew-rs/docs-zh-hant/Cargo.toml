[package]
name = "yew-site-docs-zh-hant"
version = "0.1.0"
edition = "2021"
rust-version = "1.84"

[features]
default = ["csr"]
csr = ["yew/csr", "yew-site-lib/csr"]
ssr = ["yew/ssr", "yew-site-lib/ssr"]

[dependencies]
yew = "0.23"
yew-site-lib = { path = "../lib", default-features = false }
yew-site-docs = { path = "../docs", default-features = false }


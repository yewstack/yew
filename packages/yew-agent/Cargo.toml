[package]
name = "yew-agent"
version = "0.5.0"
authors = ["Hamza <muhammadhamza1311@gmail.com>"]
repository = "https://github.com/yewstack/yew"
homepage = "https://yew.rs"
documentation = "https://docs.rs/yew/"
edition = "2021"
readme = "../../README.md"
description = "Agents for Yew"
license = "MIT OR Apache-2.0"
rust-version = "1.84.0"

[dependencies]
yew = { version = "0.23.0", path = "../yew" }
gloo-worker = { version = "0.6", features = ["futures"] }
wasm-bindgen.workspace = true
serde = { workspace = true, features = ["derive"] }
futures.workspace = true
yew-agent-macro = { version = "0.4", path = "../yew-agent-macro" }

[dev-dependencies]
serde = { workspace = true }

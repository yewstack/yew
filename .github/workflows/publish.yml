name: Publish yew package(s)

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Version Level major|minor|patch"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      packages:
        description: "List of packages to publish (space separated)"
        required: true
        type: string

jobs:
  publish:
    name: Publish yew
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          token: "${{ secrets.YEWTEMPBOT_TOKEN }}"
          fetch-depth: 0

      - name: Config Git
        uses: oleksiyrudenko/gha-git-credentials@v2.1.2
        with:
          token: "${{ secrets.YEWTEMPBOT_TOKEN }}"

      - name: Setup toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install cargo binary dependencies
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-release
          version: =1.1.1

      - name: Cargo login
        run: echo ${{ secrets.CRATES_IO_TOKEN }} | cargo login

      - name: Release yew
        shell: bash
        env:
          PACKAGES: ${{ github.event.inputs.packages }}
          LEVEL: ${{ github.event.inputs.level }}
        run: |
          arguments=()
          for pkg in $PACKAGES; do
            arguments+=("--package" "$pkg")
          done
          cargo release "$LEVEL" --execute --no-confirm "${arguments[@]}"

      - name: Collect release info
        id: releaseinfo
        env:
          PACKAGES: ${{ github.event.inputs.packages }}
        run: cargo run -p collect-release-info -- $PACKAGES

      - name: Create a version branch
        if: github.event.inputs.level != 'patch'
        uses: peterjgrainger/action-create-branch@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branch: ${{ steps.releaseinfo.outputs.version_branch }}

      - name: Create releases
        env:
          GH_TOKEN: ${{ secrets.YEWTEMPBOT_TOKEN }}
          RELEASES: ${{ steps.releaseinfo.outputs.releases }}
        run: |
          echo "$RELEASES" | jq -c '.[]' | while read -r release; do
            tag=$(echo "$release" | jq -r '.tag')
            name=$(echo "$release" | jq -r '.name')
            body=$(echo "$release" | jq -r '.body')
            gh release create "$tag" --title "$name" --notes "$body"
          done

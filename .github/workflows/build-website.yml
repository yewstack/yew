name: Build website
on:
  pull_request:
    branches: [master]
    paths:
      - "yew-rs/**"
      - "tools/website-e2e/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/*-website.yml"
  push:
    branches: [master]
    paths:
      - "yew-rs/**"
      - "tools/website-e2e/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/*-website.yml"

jobs:
  build:
    name: Build Website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install wasm-bindgen-cli
        shell: bash
        run: ./ci/install-wasm-bindgen-cli.sh

      - name: Get latest wasm-opt version
        id: wasm-opt
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          repository: WebAssembly/binaryen
          excludes: prerelease, draft
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install wasm-opt
        run: |
          VERSION="${{ steps.wasm-opt.outputs.release }}"
          curl -sL "https://github.com/WebAssembly/binaryen/releases/download/${VERSION}/binaryen-${VERSION}-x86_64-linux.tar.gz" | tar xz
          sudo install "binaryen-${VERSION}/bin/wasm-opt" /usr/local/bin/

      - name: Build site
        run: cargo run --release -p yew-site-ssg -- --release --all-locales

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: website
          path: yew-rs/build/
          retention-days: 1

      - if: github.event_name == 'pull_request'
        name: Build pr info
        run: |
          echo "${{ github.event.number }}" > .PR_INFO

      - if: github.event_name == 'pull_request'
        name: Upload pr info
        uses: actions/upload-artifact@v7
        with:
          name: pr-info
          include-hidden-files: true
          path: .PR_INFO
          retention-days: 1

  e2e:
    name: Website E2E Navigation
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: false

      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: website
          path: yew-rs/build/

      - uses: browser-actions/setup-geckodriver@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Start geckodriver
        run: geckodriver --port 4444 &

      - name: Run e2e tests
        env:
          HEADLESS: "1"
          WEBDRIVER_URL: "http://localhost:4444"
        run: cargo test -p website-e2e -- --test-threads=1
